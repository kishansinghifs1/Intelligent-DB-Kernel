# ═══════════════════════════════════════════════════════════════════════
# MiniPostgres Kernel Configuration
# ═══════════════════════════════════════════════════════════════════════

spring.application.name=minipostgres-kernel

# ─── Server ─────────────────────────────────────────────────────────
server.port=8080

# ─── Storage Engine ─────────────────────────────────────────────────
minipostgres.data-dir=kernel-data
minipostgres.buffer-pool-size=100

# ─── gRPC Server (for frontend queries) ────────────────────────────
grpc.server.port=9090

# ─── gRPC Client (to Python RL Optimizer) ──────────────────────────
minipostgres.optimizer.grpc.host=localhost
minipostgres.optimizer.grpc.port=50051

# ─── Cache (Caffeine — in-memory) ──────────────────────────────────
# Swap to Redis later: spring.cache.type=redis
minipostgres.cache.max-size=10000
minipostgres.cache.ttl-seconds=5

# ─── Actuator ──────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# ─── Logging ───────────────────────────────────────────────────────
logging.level.database.kernel=INFO
logging.level.database.kernel.advisor=DEBUG
logging.level.io.grpc=WARN
logging.level.net.devh=WARN
